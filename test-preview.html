<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Engine - Mega Previewer v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 font-sans leading-tight">

    <div class="max-w-xl mx-auto text-center my-6">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase italic">Ketick OS Mega Preview</h1>
        <p class="text-slate-500 text-[10px] mt-1 tracking-[0.3em]">WHATSAPP INTEGRATED ENGINE</p>
    </div>

    <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl mb-8">
        <div class="space-y-4">
            <select id="templateId" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-blue-400 font-black outline-none text-center">
                <option value="01">ID 01: MULTI-PURPOSE</option>
                <option value="02">ID 02: TECH SAAS</option>
                <option value="03">ID 03: INDUSTRIAL</option>
                <option value="04">ID 04: PORTFOLIO</option>
                <option value="05">ID 05: CLINIC PRO</option>
                <option value="09">ID 09: RESTAURANT</option>
                <option value="12">ID 12: FITNESS GYM</option>
                <option value="17">ID 17: SCHOOL</option>
                </select>
            <input type="text" id="bizName" value="Bisnes Saya" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center outline-none">
            <button onclick="runMegaPreview()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase italic tracking-widest transition-all">
                GENERATE LIVE VIEW
            </button>
        </div>
    </div>

    <div class="max-w-[360px] mx-auto border-[12px] border-slate-900 rounded-[3.5rem] shadow-2xl bg-white aspect-[9/19] overflow-hidden relative">
        <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        function runMegaPreview() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            const loc = "Negeri Sembilan, Malaysia";

            // Enjin Layout dengan WhatsApp Bubble Terbina
            const getLayout = (bg, text, accent, icon, desc, waColor = "#25D366") => `
                <html>
                <head>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                </head>
                <body class="${bg} ${text} font-sans m-0 p-0 min-h-screen relative">
                    <nav class="p-5 flex justify-between items-center bg-white/5 backdrop-blur-sm sticky top-0 border-b border-black/5">
                        <span class="font-black italic uppercase tracking-tighter">${name}</span>
                        <i class="fa-solid fa-bars opacity-50"></i>
                    </nav>

                    <div class="p-10 text-center">
                        <div class="w-20 h-20 ${accent} rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-3xl shadow-2xl rotate-3">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <h1 class="text-4xl font-black uppercase tracking-tighter italic leading-none">${name}</h1>
                        <p class="mt-6 opacity-60 text-sm leading-relaxed">${desc}</p>
                        
                        <div class="mt-12 space-y-4">
                            <button class="w-full py-5 rounded-[2rem] font-black ${accent} shadow-2xl active:scale-95 transition-all text-xs tracking-widest">
                                LIHAT KATALOG
                            </button>
                            <p class="text-[10px] opacity-40 uppercase tracking-widest font-bold">Lokasi: ${loc}</p>
                        </div>
                    </div>

                    <div style="position:fixed; bottom:20px; right:20px; z-index:999;">
                        <a href="#" style="background:${waColor}; width:60px; height:60px; border-radius:100%; display:flex; align-items:center; justify-content:center; color:white; font-size:30px; box-shadow:0 10px 25px rgba(37,211,102,0.3); text-decoration:none;">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                        <div style="position:absolute; right:70px; bottom:10px; background:white; color:black; padding:8px 15px; border-radius:15px; font-size:10px; font-weight:bold; white-space:nowrap; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
                            Sembang dengan kami!
                        </div>
                    </div>
                </body>
                </html>`;

            let content = "";
            switch(id) {
                case "01": content = getLayout("bg-white", "text-black", "bg-black text-white", "fa-star", "Penyelesaian Multi-Purpose yang fleksibel."); break;
                case "02": content = getLayout("bg-slate-900", "text-white", "bg-blue-600 text-white", "fa-cloud", "Teknologi Cloud SaaS Moden."); break;
                case "03": content = getLayout("bg-zinc-100", "text-zinc-900", "bg-orange-600 text-white", "fa-warehouse", "Sistem Perindustrian & Kilang."); break;
                case "05": content = getLayout("bg-blue-50", "text-blue-900", "bg-blue-600 text-white", "fa-hospital", "Pengurusan Klinik Digital."); break;
                case "09": content = getLayout("bg-amber-50", "text-amber-950", "bg-amber-600 text-white", "fa-pizza-slice", "Pesanan Makanan Kafe & Restoran."); break;
                case "12": content = getLayout("bg-black", "text-white", "bg-red-600 text-white", "fa-fire", "Pusat Kecergasan & Gimnasium."); break;
                case "17": content = getLayout("bg-sky-50", "text-sky-900", "bg-yellow-500 text-black", "fa-book", "Pendidikan Sekolah & Akademi."); break;
                default: content = getLayout("bg-white", "text-black", "bg-blue-600 text-white", "fa-check", "Ketick OS Template.");
            }

            const frame = document.getElementById('previewFrame');
            const blob = new Blob([content], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }

        setTimeout(runMegaPreview, 500);
    </script>
</body>
</html>
