<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Engine - Setup Wizard v5.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 font-sans leading-tight">

    <div class="max-w-xl mx-auto text-center my-6">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase italic leading-none">Ketick OS Wizard</h1>
        <p class="text-slate-500 text-[10px] mt-1 tracking-[0.3em]">CUSTOMIZABLE SAAS ENGINE</p>
    </div>

    <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl mb-8">
        <div class="space-y-5">
            <div>
                <label class="text-[10px] uppercase font-black text-slate-500 ml-2 mb-2 block tracking-widest text-center">Pilih Kategori</label>
                <select id="templateId" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-blue-400 font-black outline-none text-center appearance-none">
                    <option value="05">ID 05: CLINIC PRO</option>
                    <option value="01">ID 01: MULTI-PURPOSE</option>
                    <option value="09">ID 09: RESTAURANT</option>
                    <option value="12">ID 12: FITNESS GYM</option>
                </select>
            </div>

            <div class="grid grid-cols-1 gap-3">
                <input type="text" id="bizName" value="Klinik Yakin Bahau" placeholder="Nama Bisnes" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center outline-none focus:border-blue-500">
                <input type="text" id="bizService" value="Rawatan Pakar & Am" placeholder="Servis Utama (Cth: Potong Rambut)" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center text-sm outline-none focus:border-blue-500">
            </div>

            <div>
                <label class="text-[10px] uppercase font-black text-slate-500 ml-2 mb-2 block tracking-widest text-center">Warna Tema</label>
                <div class="flex justify-center gap-3 bg-black/50 p-3 rounded-2xl">
                    <button onclick="setTheme('#2563eb')" class="w-8 h-8 rounded-full bg-blue-600 border-2 border-white ring-2 ring-transparent focus:ring-blue-400 outline-none"></button>
                    <button onclick="setTheme('#e11d48')" class="w-8 h-8 rounded-full bg-rose-600 border-2 border-white outline-none"></button>
                    <button onclick="setTheme('#059669')" class="w-8 h-8 rounded-full bg-emerald-600 border-2 border-white outline-none"></button>
                    <button onclick="setTheme('#d97706')" class="w-8 h-8 rounded-full bg-amber-600 border-2 border-white outline-none"></button>
                    <button onclick="setTheme('#000000')" class="w-8 h-8 rounded-full bg-black border-2 border-white outline-none"></button>
                    <input type="hidden" id="themeColor" value="#2563eb">
                </div>
            </div>

            <button onclick="runMegaPreview()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase italic tracking-widest transition-all shadow-lg shadow-blue-900/40 active:scale-95">
                GENERATE WEBSITE
            </button>
        </div>
    </div>

    <div class="max-w-[360px] mx-auto border-[12px] border-slate-900 rounded-[3.5rem] shadow-2xl bg-white aspect-[9/19] overflow-hidden relative">
        <iframe id="previewFrame" class="w-full h-full border-none bg-slate-50"></iframe>
    </div>

    <script>
        function setTheme(color) {
            document.getElementById('themeColor').value = color;
            console.log("Warna tema ditukar ke:", color);
        }

        function runMegaPreview() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            const service = document.getElementById('bizService').value;
            const color = document.getElementById('themeColor').value;
            const loc = "Negeri Sembilan, Malaysia";

            const getLayout = (icon) => `
                <html>
                <head>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                </head>
                <body class="bg-white text-slate-900 font-sans m-0 p-0 min-h-screen relative">
                    <nav class="p-5 flex justify-between items-center bg-white sticky top-0 border-b border-slate-100 z-10">
                        <span class="font-black italic uppercase tracking-tighter" style="color:${color}">${name}</span>
                        <i class="fa-solid fa-bars text-slate-300"></i>
                    </nav>

                    <div class="p-8 text-center">
                        <div class="w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-3xl text-white shadow-2xl" style="background:${color}">
                            <i class="fa-solid ${icon}"></i>
                        </div>
                        <h1 class="text-3xl font-black uppercase tracking-tighter italic leading-none text-slate-900">${name}</h1>
                        <div class="mt-4 inline-block px-4 py-1 rounded-full text-[10px] font-bold uppercase tracking-widest text-white" style="background:${color}cc">
                            ${service}
                        </div>
                        <p class="mt-6 text-slate-500 text-sm leading-relaxed px-4 italic">Beroperasi dengan penuh dedikasi di ${loc}. Hubungi kami sekarang!</p>
                        
                        <div class="mt-12">
                            <button class="w-full py-5 rounded-[2rem] font-black text-white shadow-2xl active:scale-95 transition-all text-xs tracking-widest uppercase" style="background:${color}">
                                TEMPAH SEKARANG
                            </button>
                        </div>
                    </div>

                    <div style="position:fixed; bottom:20px; right:20px; z-index:999;">
                        <a href="#" style="background:#25D366; width:60px; height:60px; border-radius:100%; display:flex; align-items:center; justify-content:center; color:white; font-size:30px; box-shadow:0 10px 25px rgba(37,211,102,0.3); text-decoration:none;">
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                    </div>
                </body>
                </html>`;

            let icon = "fa-star";
            if(id === "05") icon = "fa-user-doctor";
            if(id === "09") icon = "fa-utensils";
            if(id === "12") icon = "fa-dumbbell";

            const frame = document.getElementById('previewFrame');
            const blob = new Blob([getLayout(icon)], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }

        setTimeout(runMegaPreview, 500);
    </script>
</body>
</html>
