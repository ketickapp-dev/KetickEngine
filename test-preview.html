<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Engine - Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 font-sans">

    <div class="max-w-xl mx-auto text-center my-8">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase italic">Ketick OS Previewer</h1>
        <p class="text-slate-500 text-xs">Uji template anda secara real-time.</p>
    </div>

    <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-6 rounded-[2rem] shadow-2xl mb-8">
        <div class="space-y-4">
            <input type="text" id="templateId" placeholder="ID (01-21)" value="05" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center text-blue-400 font-black text-xl outline-none">
            <input type="text" id="bizName" placeholder="Nama Bisnes" value="Klinik Yakin Bahau" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center outline-none">
            <button onclick="runPreview()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase italic tracking-widest transition-all">
                Generate Live View
            </button>
        </div>
    </div>

    <div class="max-w-[360px] mx-auto border-[12px] border-slate-900 rounded-[3rem] shadow-2xl bg-white aspect-[9/19] overflow-hidden relative">
        <iframe id="previewFrame" class="w-full h-full border-none bg-white"></iframe>
    </div>

    <script type="module">
        // KITA PANGGIL DIRECT DARI INDEX.JS UNTUK ELAK ERROR
        import { KetickEngine } from './templates/index.js';

        window.runPreview = function() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            
            try {
                const html = KetickEngine(id, { 
                    name: name,
                    location: "Bahau, Negeri Sembilan",
                    contact: "60123456789"
                });

                const frame = document.getElementById('previewFrame');
                const blob = new Blob([html], { type: 'text/html' });
                frame.src = URL.createObjectURL(blob);
            } catch (err) {
                alert("Ralat: Pastikan ID betul dan fail index.js sudah di-commit!");
                console.error(err);
            }
        }

        // Jalankan sekali masa mula
        setTimeout(() => { runPreview(); }, 1000);
    </script>
</body>
</html>
