<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Engine - Mega Previewer Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 font-sans">

    <div class="max-w-xl mx-auto text-center my-6">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase italic">Ketick OS Mega Preview</h1>
    </div>

    <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl mb-8">
        <div class="space-y-4">
            <select id="templateId" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-blue-400 font-black outline-none text-center">
                <option value="05">ID 05: CLINIC PRO</option>
                <option value="01">ID 01: MODERN BIZ</option>
            </select>
            <input type="text" id="bizName" value="Klinik Yakin Bahau" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center outline-none">
            <button onclick="runMegaPreview()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase italic tracking-widest transition-all">
                GENERATE LIVE VIEW
            </button>
        </div>
    </div>

    <div class="max-w-[360px] mx-auto border-[12px] border-slate-900 rounded-[3.5rem] shadow-2xl bg-white aspect-[9/19] overflow-hidden relative">
        <iframe id="previewFrame" class="w-full h-full border-none bg-slate-50"></iframe>
    </div>

    <script>
        function runMegaPreview() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            const loc = "Bahau, Negeri Sembilan";

            let content = "";

            if (id === "05") {
                // Pastikan tiada simbol ` yang bertindan di sini
                content = `
                <html>
                <head>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                </head>
                <body class="bg-slate-50 text-slate-900 m-0 p-0 font-sans">
                    <nav class="bg-white p-4 border-b flex justify-between items-center shadow-sm">
                        <div class="text-blue-600 font-extrabold text-lg uppercase italic">${name}</div>
                        <i class="fa-solid fa-bars text-slate-400"></i>
                    </nav>

                    <div class="py-10 px-6 text-center">
                        <span class="bg-blue-100 text-blue-700 text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Medical Service</span>
                        <h1 class="text-3xl font-extrabold mt-4 text-slate-900">${name}</h1>
                        <p class="text-slate-500 text-xs mt-3 leading-relaxed font-medium">Penjagaan Kesihatan Profesional di <span class="text-blue-600">${loc}</span></p>
                        
                        <div class="mt-8">
                            <a href="#" class="block bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-200">
                                <i class="fa-brands fa-whatsapp mr-2"></i> TEMPAH SLOT
                            </a>
                        </div>
                    </div>

                    <div class="px-6 grid grid-cols-2 gap-4">
                        <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                            <i class="fa-solid fa-stethoscope text-blue-600 mb-2"></i>
                            <div class="text-[10px] font-bold">Rawatan Am</div>
                        </div>
                        <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                            <i class="fa-solid fa-heart-pulse text-rose-500 mb-2"></i>
                            <div class="text-[10px] font-bold">Kesihatan</div>
                        </div>
                    </div>

                    <div class="m-6 p-5 bg-slate-900 rounded-[2rem] text-white">
                        <div class="text-[10px] opacity-50 uppercase font-bold mb-3">Waktu Operasi</div>
                        <div class="text-xs space-y-2">
                            <div class="flex justify-between"><span>Isnin - Jumaat</span><span class="font-bold text-blue-400">8AM - 10PM</span></div>
                            <div class="flex justify-between"><span>Sabtu - Ahad</span><span class="font-bold text-blue-400">9AM - 5PM</span></div>
                        </div>
                    </div>
                </body>
                </html>`;
            } else {
                content = `
                <html>
                <head><script src="https://cdn.tailwindcss.com"><\/script></head>
                <body class="bg-black text-white h-screen flex items-center justify-center text-center p-10 font-sans">
                    <div>
                        <h1 class="text-4xl font-black italic uppercase">${name}</h1>
                        <p class="text-slate-500 text-xs mt-4 tracking-widest uppercase">Coming Soon in ${loc}</p>
                    </div>
                </body>
                </html>`;
            }

            const frame = document.getElementById('previewFrame');
            const blob = new Blob([content], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }

        setTimeout(runMegaPreview, 500);
    </script>
</body>
</html>
