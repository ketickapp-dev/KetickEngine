<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Engine - Booking System v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-950 text-white p-4 font-sans leading-tight">

    <div class="max-w-xl mx-auto text-center my-6">
        <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase italic">Ketick OS Booking</h1>
        <p class="text-slate-500 text-[10px] mt-1 tracking-[0.3em]">INTERACTIVE APPOINTMENT ENGINE</p>
    </div>

    <div class="max-w-md mx-auto bg-slate-900 border border-slate-800 p-6 rounded-[2.5rem] shadow-2xl mb-8">
        <div class="space-y-4">
            <select id="templateId" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-blue-400 font-black outline-none text-center">
                <option value="05">ID 05: CLINIC PRO</option>
                <option value="01">ID 01: MULTI-PURPOSE</option>
                <option value="09">ID 09: RESTAURANT</option>
            </select>
            <input type="text" id="bizName" value="Klinik Yakin Bahau" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-center outline-none">
            
            <div class="flex justify-center gap-2 bg-black/40 p-2 rounded-2xl">
                <button onclick="setTheme('#2563eb')" class="w-8 h-8 rounded-full bg-blue-600 border-2 border-white"></button>
                <button onclick="setTheme('#e11d48')" class="w-8 h-8 rounded-full bg-rose-600 border-2 border-white"></button>
                <button onclick="setTheme('#059669')" class="w-8 h-8 rounded-full bg-emerald-600 border-2 border-white"></button>
                <input type="hidden" id="themeColor" value="#2563eb">
            </div>

            <button onclick="runMegaPreview()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-black uppercase italic tracking-widest transition-all shadow-lg active:scale-95">
                GENERATE & TEST BOOKING
            </button>
        </div>
    </div>

    <div class="max-w-[360px] mx-auto border-[12px] border-slate-900 rounded-[3.5rem] shadow-2xl bg-white aspect-[9/19] overflow-hidden relative">
        <iframe id="previewFrame" class="w-full h-full border-none bg-slate-50"></iframe>
    </div>

    <script>
        function setTheme(color) { document.getElementById('themeColor').value = color; }

        function runMegaPreview() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            const color = document.getElementById('themeColor').value;

            const content = `
                <html>
                <head>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                </head>
                <body class="bg-slate-50 font-sans m-0 p-0 min-h-screen relative overflow-x-hidden">
                    <nav class="p-5 bg-white border-b flex justify-between items-center sticky top-0 z-10">
                        <span class="font-black italic uppercase tracking-tighter" style="color:${color}">${name}</span>
                        <i class="fa-solid fa-bars text-slate-300"></i>
                    </nav>

                    <div class="p-8 text-center">
                        <div class="w-20 h-20 rounded-[2rem] flex items-center justify-center mx-auto mb-6 text-3xl text-white shadow-xl" style="background:${color}">
                            <i class="fa-solid fa-calendar-check"></i>
                        </div>
                        <h1 class="text-3xl font-black uppercase tracking-tighter italic leading-none text-slate-900">${name}</h1>
                        <p class="mt-4 text-slate-500 text-sm">Sila klik butang di bawah untuk tempahan segera.</p>
                        
                        <button onclick="openBooking()" class="mt-10 w-full py-5 rounded-[2rem] font-black text-white shadow-2xl active:scale-95 transition-all text-xs tracking-widest uppercase" style="background:${color}">
                            TEMPAH SEKARANG
                        </button>
                    </div>

                    <div id="bookingSheet" class="fixed inset-0 bg-black/60 z-50 transition-opacity duration-300 opacity-0 pointer-events-none">
                        <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 transform translate-y-full transition-transform duration-300 shadow-[0_-20px_50px_rgba(0,0,0,0.2)]">
                            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
                            <h2 class="text-xl font-black uppercase italic mb-6" style="color:${color}">Borang Tempahan</h2>
                            <div class="space-y-4">
                                <input type="text" placeholder="Nama Penuh" class="w-full bg-slate-100 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-offset-2" style="--tw-ring-color:${color}">
                                <input type="tel" placeholder="No. WhatsApp" class="w-full bg-slate-100 p-4 rounded-2xl outline-none focus:ring-2 focus:ring-offset-2" style="--tw-ring-color:${color}">
                                <input type="date" class="w-full bg-slate-100 p-4 rounded-2xl outline-none" style="--tw-ring-color:${color}">
                                <button onclick="closeBooking()" class="w-full py-4 rounded-2xl font-black text-white uppercase tracking-widest text-xs" style="background:${color}">HANTAR TEMPAHAN</button>
                            </div>
                        </div>
                    </div>

                    <script>
                        function openBooking() {
                            const sheet = document.getElementById('bookingSheet');
                            sheet.classList.remove('opacity-0', 'pointer-events-none');
                            sheet.classList.add('opacity-100');
                            sheet.children[0].classList.remove('translate-y-full');
                            sheet.children[0].classList.add('translate-y-0');
                        }
                        function closeBooking() {
                            const sheet = document.getElementById('bookingSheet');
                            sheet.classList.add('opacity-0', 'pointer-events-none');
                            sheet.children[0].classList.add('translate-y-full');
                            alert("Tempahan anda telah dihantar! Pihak ${name} akan menghubungi anda sebentar lagi.");
                        }
                    <\/script>
                </body>
                </html>`;

            const frame = document.getElementById('previewFrame');
            const blob = new Blob([content], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }

        setTimeout(runMegaPreview, 500);
    </script>
</body>
</html>
