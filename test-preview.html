<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK Engine - Live Template Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-white p-6">

    <div class="max-w-xl mx-auto text-center mb-10">
        <h1 class="text-3xl font-black italic text-blue-400">KETICK ENGINE PREVIEW</h1>
        <p class="text-slate-400 text-sm mt-2">Pilih ID Template untuk test paparan.</p>
    </div>

    <div class="max-w-xl mx-auto bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl mb-10">
        <div class="grid grid-cols-1 gap-4">
            <div>
                <label class="block text-xs font-bold uppercase mb-2 text-slate-500">Pilih ID Template (01-22)</label>
                <input type="text" id="templateId" value="05" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-blue-400 font-bold outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="block text-xs font-bold uppercase mb-2 text-slate-500">Nama Bisnes</label>
                <input type="text" id="bizName" value="Klinik Yakin Bahau" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl outline-none">
            </div>
            <button onclick="previewTemplate()" class="bg-blue-600 hover:bg-blue-700 w-full py-4 rounded-xl font-bold transition-all uppercase tracking-widest italic">
                Generate Preview
            </button>
        </div>
    </div>

    <div class="max-w-4xl mx-auto">
        <div class="flex items-center gap-2 mb-4 bg-slate-800 p-3 rounded-full inline-flex px-6">
            <div class="w-3 h-3 bg-red-500 rounded-full"></div>
            <div class="w-3 h-3 bg-yellow-500 rounded-full"></div>
            <div class="w-3 h-3 bg-green-500 rounded-full"></div>
            <span class="text-xs font-mono ml-4 text-slate-400 uppercase tracking-widest">Mobile View Emulator</span>
        </div>
        
        <div class="border-8 border-slate-800 rounded-[3rem] overflow-hidden shadow-2xl bg-white aspect-[9/19] max-w-[360px] mx-auto">
            <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
        </div>
    </div>

    <script type="module">
        // Import KetickEngine secara dinamik
        import { KetickEngine } from './templates/index.js';

        window.previewTemplate = function() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            
            // Generate HTML menggunakan Engine kita
            const htmlResult = KetickEngine(id, { 
                name: name, 
                location: "Bahau, Negeri Sembilan",
                contact: "60123456789" 
            });

            // Masukkan hasil ke dalam Iframe
            const frame = document.getElementById('previewFrame');
            const doc = frame.contentWindow.document;
            doc.open();
            doc.write(htmlResult);
            doc.close();
        }

        // Auto-run pada permulaan
        window.onload = () => previewTemplate();
    </script>

</body>
</html>
