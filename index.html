<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KETICK OS - Admin Command Center v11.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #020617; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-white font-sans selection:bg-blue-500 overflow-hidden h-screen flex flex-col">

    <nav class="border-b border-slate-800 p-4 flex justify-between items-center glass z-20">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center shadow-lg shadow-blue-900/40">
                <i class="fa-solid fa-cube text-sm"></i>
            </div>
            <div>
                <h1 class="text-sm font-black tracking-tighter uppercase italic text-blue-500 leading-none">Ketick OS <span class="text-white">v11.0</span></h1>
                <p class="text-[8px] text-slate-500 font-bold tracking-[0.2em] uppercase mt-1">Admin Command Center</p>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <span class="hidden md:block text-[9px] font-black text-green-400 bg-green-500/10 px-3 py-1 rounded-full animate-pulse uppercase">Engine Online</span>
            <div class="h-8 w-[1px] bg-slate-800 mx-2"></div>
            <button class="text-slate-500 hover:text-white transition-colors"><i class="fa-solid fa-gear"></i></button>
        </div>
    </nav>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-full md:w-[400px] border-r border-slate-800 flex flex-col glass overflow-y-auto custom-scroll p-6">
            
            <div class="space-y-6">
                <div>
                    <div class="flex items-center gap-2 mb-4">
                        <i class="fa-solid fa-wand-magic-sparkles text-blue-500 text-xs"></i>
                        <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Konfigurasi Engine</h2>
                    </div>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] font-black text-slate-500 mb-2 block uppercase tracking-widest ml-1">Template Kategori</label>
                            <select id="templateId" onchange="runMegaPreview()" class="w-full bg-black border border-slate-800 p-4 rounded-2xl text-blue-400 font-bold outline-none cursor-pointer hover:border-blue-500 transition-all">
                                <option value="01">ID 01: MULTI-PURPOSE</option>
                                <option value="02">ID 02: TECH SAAS</option>
                                <option value="03">ID 03: INDUSTRIAL</option>
                                <option value="05" selected>ID 05: CLINIC PRO</option>
                                <option value="09">ID 09: RESTAURANT</option>
                                <option value="12">ID 12: FITNESS GYM</option>
                                <option value="13">ID 13: BOUTIQUE (E-COMMERCE)</option>
                                <option value="14">ID 14: GADGET STORE (E-COMMERCE)</option>
                                <option value="19">ID 19: REAL ESTATE</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[9px] font-black text-slate-500 mb-2 block uppercase tracking-widest ml-1">Nama Bisnes / Projek</label>
                            <input type="text" id="bizName" oninput="runMegaPreview()" value="Klinik Yakin Bahau" class="w-full bg-black border border-slate-800 p-4 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all">
                        </div>

                        <div class="bg-black/40 p-4 rounded-3xl border border-slate-800/50">
                            <label class="text-[9px] font-black text-slate-500 mb-3 block uppercase tracking-widest text-center">Katalog & Harga</label>
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <input type="text" id="p1_name" value="Standard Pack" oninput="runMegaPreview()" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-slate-800 outline-none">
                                <input type="text" id="p1_price" value="RM 89" oninput="runMegaPreview()" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-slate-800 outline-none text-blue-400 font-bold">
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" id="p2_name" value="Premium Pack" oninput="runMegaPreview()" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-slate-800 outline-none">
                                <input type="text" id="p2_price" value="RM 149" oninput="runMegaPreview()" class="bg-slate-900 p-3 rounded-xl text-[10px] border border-slate-800 outline-none text-blue-400 font-bold">
                            </div>
                        </div>

                        <div class="flex justify-between items-center bg-black/40 p-3 rounded-2xl border border-slate-800/50">
                            <span class="text-[9px] font-black text-slate-500 uppercase tracking-widest ml-2">Tema Warna</span>
                            <div class="flex gap-2">
                                <button onclick="setTheme('#2563eb')" class="w-6 h-6 rounded-full bg-blue-600 border border-white/20"></button>
                                <button onclick="setTheme('#e11d48')" class="w-6 h-6 rounded-full bg-rose-600 border border-white/20"></button>
                                <button onclick="setTheme('#059669')" class="w-6 h-6 rounded-full bg-emerald-600 border border-white/20"></button>
                                <input type="hidden" id="themeColor" value="#2563eb">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="pt-6 border-t border-slate-800">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400">Live Analytics</h2>
                        <span class="text-[8px] font-bold text-blue-400">SESSION: 04:22</span>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="bg-blue-600/5 p-4 rounded-2xl border border-blue-500/20">
                            <p class="text-[7px] text-slate-500 uppercase font-black mb-1">Total Sales</p>
                            <h4 class="text-sm font-black text-white">RM 4,280</h4>
                        </div>
                        <div class="bg-slate-800/20 p-4 rounded-2xl border border-slate-800">
                            <p class="text-[7px] text-slate-500 uppercase font-black mb-1">New Leads</p>
                            <h4 class="text-sm font-black text-white">24 Prospek</h4>
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="bg-black/20 p-3 rounded-xl flex items-center justify-between border border-slate-800/30">
                            <div class="flex items-center gap-2">
                                <i class="fa-solid fa-circle-check text-green-500 text-[8px]"></i>
                                <span class="text-[9px] font-bold">Booking: Ali bin Ahmad</span>
                            </div>
                            <span class="text-[8px] text-slate-600">Terbaru</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-10 text-center opacity-30">
                <p class="text-[8px] font-black tracking-[0.4em] uppercase italic">Ketick OS Lab &copy; 2026</p>
            </div>
        </aside>

        <main class="flex-1 bg-[#010409] relative flex items-center justify-center p-4">
            
            <div class="absolute inset-0 flex items-center justify-center opacity-[0.02] pointer-events-none select-none">
                <h1 class="text-[25vw] font-black italic uppercase tracking-tighter">KETICK</h1>
            </div>

            <div class="relative z-10 w-full max-w-[340px] shadow-[0_50px_100px_rgba(0,0,0,0.9)] border-[12px] border-slate-900 rounded-[3.5rem] bg-white aspect-[9/19] overflow-hidden ring-8 ring-slate-800/10 scale-[0.9] md:scale-100 transition-transform">
                <iframe id="previewFrame" class="w-full h-full border-none"></iframe>
            </div>

            <div class="absolute bottom-8 right-8 flex flex-col gap-3">
                <button onclick="runMegaPreview()" class="bg-blue-600 w-12 h-12 rounded-2xl shadow-xl shadow-blue-900/40 flex items-center justify-center hover:scale-110 active:scale-95 transition-all" title="Refresh Preview">
                    <i class="fa-solid fa-rotate text-white"></i>
                </button>
                <button onclick="window.print()" class="bg-slate-800 w-12 h-12 rounded-2xl shadow-xl flex items-center justify-center hover:scale-110 transition-all" title="Export Code">
                    <i class="fa-solid fa-code text-white"></i>
                </button>
            </div>
        </main>
    </div>

    <script>
        function setTheme(color) { 
            document.getElementById('themeColor').value = color; 
            runMegaPreview();
        }

        function runMegaPreview() {
            const id = document.getElementById('templateId').value;
            const name = document.getElementById('bizName').value;
            const color = document.getElementById('themeColor').value;
            const p1 = { n: document.getElementById('p1_name').value, p: document.getElementById('p1_price').value };
            const p2 = { n: document.getElementById('p2_name').value, p: document.getElementById('p2_price').value };
            
            const isEcommerce = (id === "13" || id === "14");

            const templates = {
                "01": { icon: "fa-bolt", desc: "Penyelesaian Perniagaan Multi-Purpose.", bg: "bg-white", text: "text-slate-900" },
                "02": { icon: "fa-microchip", desc: "Teknologi SaaS & Cloud.", bg: "bg-slate-900", text: "text-white" },
                "03": { icon: "fa-industry", desc: "Kilang Perindustrian.", bg: "bg-zinc-100", text: "text-zinc-900" },
                "05": { icon: "fa-user-doctor", desc: "Klinik Profesional.", bg: "bg-sky-50", text: "text-sky-900" },
                "09": { icon: "fa-utensils", desc: "Restoran & Kafe.", bg: "bg-orange-50", text: "text-orange-900" },
                "12": { icon: "fa-dumbbell", desc: "Gimnasium & Fitness.", bg: "bg-zinc-950", text: "text-white" },
                "13": { icon: "fa-shirt", desc: "Butik Fesyen.", bg: "bg-white", text: "text-black" },
                "14": { icon: "fa-mobile-screen", desc: "Gajet Elektronik.", bg: "bg-slate-100", text: "text-slate-900" },
                "19": { icon: "fa-house", desc: "Hartanah & Real Estate.", bg: "bg-emerald-50", text: "text-emerald-900" }
            };

            const config = templates[id] || templates["01"];

            const content = `
                <html>
                <head>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
                    <style>@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap'); body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
                </head>
                <body class="${config.bg} ${config.text} m-0 p-0 min-h-screen relative">
                    <nav class="p-5 flex justify-between items-center border-b border-black/5 backdrop-blur-md sticky top-0 z-10">
                        <span class="font-black italic uppercase tracking-tighter text-lg" style="color:${color}">${name}</span>
                        <div class="relative"><i class="fa-solid ${isEcommerce ? 'fa-cart-shopping' : 'fa-bars-staggered'}"></i></div>
                    </nav>

                    <div class="p-8 text-center">
                        <div class="w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-2xl text-white shadow-xl rotate-3" style="background:${color}">
                            <i class="fa-solid ${config.icon}"></i>
                        </div>
                        <h1 class="text-2xl font-black uppercase italic leading-none">${name}</h1>
                        <p class="mt-4 opacity-50 text-[9px] uppercase font-bold tracking-widest leading-relaxed">${config.desc}</p>
                        
                        <div class="mt-8 space-y-3">
                            <div class="bg-white/70 p-4 rounded-2xl border border-black/5 flex justify-between items-center shadow-sm">
                                <div class="text-left font-black uppercase text-[10px]">${p1.n}</div>
                                <span class="font-black text-[10px]" style="color:${color}">${isEcommerce ? 'ADD' : p1.p}</span>
                            </div>
                            <div class="bg-white/70 p-4 rounded-2xl border border-black/5 flex justify-between items-center shadow-sm">
                                <div class="text-left font-black uppercase text-[10px]">${p2.n}</div>
                                <span class="font-black text-[10px]" style="color:${color}">${isEcommerce ? 'ADD' : p2.p}</span>
                            </div>
                        </div>

                        <button onclick="openBooking()" class="mt-10 w-full py-5 rounded-2xl font-black text-white text-[10px] tracking-[0.2em] uppercase shadow-2xl" style="background:${color}">
                            ${isEcommerce ? 'CHECKOUT SEKARANG' : 'TEMPAH SEKARANG'}
                        </button>

                        <div class="mt-12 opacity-20 flex justify-center gap-6">
                            <i class="fa-solid fa-handshake"></i>
                            <i class="fa-solid fa-shield-halved"></i>
                            <i class="fa-solid fa-cube"></i>
                        </div>
                    </div>

                    <div id="bookingSheet" class="fixed inset-0 bg-black/50 z-50 hidden flex items-end">
                        <div class="bg-white w-full rounded-t-[2.5rem] p-8 animate-slide-up">
                            <h2 class="font-black uppercase mb-4 text-center" style="color:${color}">Hubungi Kami</h2>
                            <input type="text" placeholder="Nama" class="w-full bg-slate-100 p-4 rounded-xl mb-2 outline-none">
                            <button onclick="closeBooking()" class="w-full py-4 rounded-xl text-white font-black uppercase text-xs" style="background:${color}">HANTAR WHATSAPP</button>
                        </div>
                    </div>

                    <div style="position:fixed; bottom:20px; right:20px;">
                        <div style="background:#25D366; width:50px; height:50px; border-radius:15px; display:flex; align-items:center; justify-content:center; color:white; box-shadow:0 10px 20px rgba(0,0,0,0.2);">
                            <i class="fa-brands fa-whatsapp text-2xl"></i>
                        </div>
                    </div>

                    <script>
                        function openBooking() { document.getElementById('bookingSheet').classList.remove('hidden'); }
                        function closeBooking() { document.getElementById('bookingSheet').classList.add('hidden'); }
                    <\/script>
                </body>
                </html>`;

            const frame = document.getElementById('previewFrame');
            const blob = new Blob([content], { type: 'text/html' });
            frame.src = URL.createObjectURL(blob);
        }
        
        // Auto-run on load
        setTimeout(runMegaPreview, 500);
    </script>
</body>
</html>
